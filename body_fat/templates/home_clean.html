<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css" integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">
    <title>BodyFat Estimator</title>
</head>
<body>
    <div class="container">
        <div class="alert alert-info mt-4" role="alert">
            <h4 class="alert-heading text-center">Body Fat Percentage Estimator</h4>
            <hr>
            <p class="text-center">Estimate your body fat percentage using body measurements</p>
        </div>

        <h4 class="text-center mt-3 my-3">Enter Your Measurements</h4>

        <div class="container my-4">
            <form action="/" method="POST">
                <div class="form-group">
                    <label for="density">Body Density (from underwater weighing)</label>
                    <input type="number" step="0.001" class="form-control" id="density" name="density" required>
                </div>

                <div class="form-group">
                    <label for="abdomen">Abdomen Circumference (cm)</label>
                    <input type="number" step="0.1" class="form-control" id="abdomen" name="abdomen" required>
                </div>

                <div class="form-group">
                    <label for="chest">Chest Circumference (cm)</label>
                    <input type="number" step="0.1" class="form-control" id="chest" name="chest" required>
                </div>

                <div class="form-group">
                    <label for="weight">Weight (lbs)</label>
                    <input type="number" step="0.1" class="form-control" id="weight" name="weight" required>
                </div>

                <div class="form-group">
                    <label for="hip">Hip Circumference (cm)</label>
                    <input type="number" step="0.1" class="form-control" id="hip" name="hip" required>
                </div>

                <div class="text-center">
                    <button class="btn btn-primary" type="submit">Calculate Body Fat</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js" integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI" crossorigin="anonymous"></script>
</body>
</html>
