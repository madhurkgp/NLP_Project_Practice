<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Placement Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .form-container {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        select.form-control {
            cursor: pointer;
        }

        .btn-container {
            text-align: center;
            margin-top: 30px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }

            .header {
                padding: 30px 20px;
            }

            .form-container {
                padding: 30px 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Campus Placement Predictor</h1>
            <p>Predict your chances of getting placed based on your academic profile and experience</p>
        </div>

        <div class="form-container">
            <form action="/" method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select class="form-control" id="gender" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="1">Male</option>
                            <option value="0">Female</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="spec">Specialisation</label>
                        <select class="form-control" id="spec" name="spec" required>
                            <option value="">Select Specialisation</option>
                            <option value="1">Marketing & HR</option>
                            <option value="0">Marketing & Finance</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tech">Technical Degree</label>
                        <select class="form-control" id="tech" name="tech" required>
                            <option value="">Select Degree</option>
                            <option value="0">Commerce & Management</option>
                            <option value="1">Others</option>
                            <option value="2">Science & Technology</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="work">Work Experience</label>
                        <select class="form-control" id="work" name="work" required>
                            <option value="">Select Experience</option>
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="ssc">SSC Percentage (%)</label>
                        <input type="number" class="form-control" id="ssc" name="ssc" 
                               min="0" max="100" step="0.1" placeholder="e.g., 85.5" required>
                    </div>

                    <div class="form-group">
                        <label for="hsc">High School Percentage (%)</label>
                        <input type="number" class="form-control" id="hsc" name="hsc" 
                               min="0" max="100" step="0.1" placeholder="e.g., 78.2" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dsc">Degree Percentage (%)</label>
                        <input type="number" class="form-control" id="dsc" name="dsc" 
                               min="0" max="100" step="0.1" placeholder="e.g., 82.3" required>
                    </div>

                    <div class="form-group">
                        <label for="mba">MBA Percentage (%)</label>
                        <input type="number" class="form-control" id="mba" name="mba" 
                               min="0" max="100" step="0.1" placeholder="e.g., 76.8" required>
                    </div>
                </div>

                <div class="btn-container">
                    <button type="submit" class="btn">Predict Placement</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
